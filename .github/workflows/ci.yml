name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Oszczędność minut Actions: anuluj poprzedni, niezakończony run dla tego samego
# ref'a, gdy przyjdzie nowy push (np. szybkie poprawki na PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit (fail tylko HIGH+)
        # Ciągły sygnał o nowych CVE (health-check Category A #3). Próg HIGH:
        # znane 5 MODERATE (dev-only Astro language-server yaml chain,
        # wait-on-upstream — zob. context/foundation/health-check.md) nie może
        # blokować pipeline'u. Dependabot (.github/dependabot.yml) dostarcza
        # cotygodniowe update PR-y; ten krok łapie CVE między sweepami.
        run: npm audit --audit-level=high

      - name: Generate Cloudflare Worker types
        # `worker-configuration.d.ts` jest .gitignored (auto-generated artifact),
        # ale `astro check` potrzebuje go żeby typecheckować `import { env } from
        # 'cloudflare:workers'` w `src/lib/db/supabase.server.ts`. Deploy.yml
        # nie potrzebuje tego stepa explicit, bo `npm run build` (astro build)
        # regeneruje plik jako side-effect. CI nie buduje przed typecheckiem.
        run: npx wrangler types

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # Job `e2e` USUNIĘTY (2026-06-08, oszczędność minut GitHub Actions).
  # E2E (Playwright) + testy integracyjne RLS + migration-gate (supabase start)
  # uruchamiamy WYŁĄCZNIE LOKALNIE:
  #   npm run test:e2e            # Playwright (reuse dev server :4321)
  #   npm run test:integration    # RLS isolation na lokalnej Supabase (WSL)
  # Migracje walidowane lokalnie (`supabase db reset`) + przy deployu
  # (deploy.yml: migrate-first `supabase db push` przed wrangler deploy).
  # Trade-off: brak automatycznej bramki E2E/integ/migracji na PR — świadoma
  # decyzja kosztowa; przywrócić przez `git revert` tego commita gdy minuty wrócą.
  # ──────────────────────────────────────────────────────────────────────────
