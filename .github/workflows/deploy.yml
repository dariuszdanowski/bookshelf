name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.claude/**'
      - 'context/**'
      - 'docs/**'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.13.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # PUBLIC_* sekrety wymagane przez Vite build-time inlining
          # (browser bundle, `src/lib/db/supabase.browser.ts`). Server czyta
          # te same wartości z `'cloudflare:workers'` env w runtime (Worker
          # Dashboard Secrets) — tu są dla browser side. SUPABASE_SERVICE_ROLE_KEY
          # i ANTHROPIC_API_KEY są server-only runtime, NIE idą do build env.
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
        continue-on-error: true

      - name: Push DB migrations to prod (migrate-first)
        # Auto-aplikacja migracji na remote prod PO merge (push: [main]), PRZED
        # deployem Workera — nowy kod nigdy nie trafia na nieztymigrowaną schemę.
        # `db push` jest idempotentny (aplikuje tylko migracje spoza remote
        # `schema_migrations`), więc no-op gdy nic nowego. Migracje są walidowane
        # pre-merge przez job `e2e` w ci.yml (`supabase start` = świeży replay +
        # seed). Fail tu = job pada PRZED deployem → kod nie idzie na prod ze złą
        # schemą. Build jest wcześniej, więc niebuildowalny kod nie tknie DB.
        #
        # Miękki guard: bez sekretów krok się pomija (warning) — wdrożenie tej
        # zmiany nie psuje deployów zanim SUPABASE_ACCESS_TOKEN/DB_PASSWORD
        # zostaną dodane (env production). Po dodaniu auto-migracje włączają się same.
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN/SUPABASE_DB_PASSWORD nieustawione — pomijam db push. Dodaj sekrety (env production), by włączyć auto-migracje."
            exit 0
          fi
          if ! command -v supabase &> /dev/null; then
            echo "::warning::Supabase CLI niedostępny (setup-cli rate limit?) — pomijam db push. Migracje należy zaaplikować ręcznie: supabase db push --linked."
            exit 0
          fi
          supabase link --project-ref foqpoqdbicgsrbkcuckc
          supabase db push

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Smoke test (post-deploy /api/health)
        # Wykrywa zombie-deploy: build zielony, ale Worker padł na boot — np.
        # brak PUBLIC_SUPABASE_* w Worker Secrets. Middleware konstruuje klienta
        # Supabase dla KAŻDEJ trasy (także /api/health), więc przy brakujących
        # sekretach bootstrap rzuca i /api/* zwraca 500 → smoke fail w ~30s
        # zamiast czekać na user incident (precedens: 1.5h debug 2026-05-26).
        #
        # Adaptacja vs m1m2-audit D1: pojedynczy probe na /api/health zamiast
        # health + auth-login z fake body. Powód: /api/auth/login zwraca generic
        # 401 i dla złych creds, i dla błędnego anon-key (privacy-by-design,
        # src/pages/api/auth/login.ts) — nie odróżnia "wired" od "drifted", więc
        # dorzuca flakiness bez sygnału. URL z wrangler-action `deployment-url`
        # output (Wrangler ≥3.81.0 structured output; repo na 4.x).
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::wrangler-action nie zwrócił deployment-url (workers.dev route wyłączony?)"
            exit 1
          fi
          HEALTH_URL="$DEPLOY_URL/api/health"
          echo "Smoke testing: $HEALTH_URL"
          body=$(curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 3 --retry-connrefused --max-time 20 \
            "$HEALTH_URL")
          echo "Response body: $body"
          echo "$body" | grep -q '"status":"ok"' || {
            echo "::error::/api/health zwrócił 2xx ale body bez \"status\":\"ok\""
            exit 1
          }
          echo "Smoke test OK"
